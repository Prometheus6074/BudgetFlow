name: Build Release APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # Required to create GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.6

      - name: Copy web assets
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html android/app/src/main/assets/
          cp styles.css  android/app/src/main/assets/
          cp app.js      android/app/src/main/assets/
          if [ -f chart.umd.min.js ]; then
            cp chart.umd.min.js android/app/src/main/assets/
          else
            echo "Downloading Chart.js..."
            curl -L https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js \
              -o android/app/src/main/assets/chart.umd.min.js
          fi
          if [ -f lucide.min.js ]; then
            cp lucide.min.js android/app/src/main/assets/
          else
            echo "Downloading Lucide..."
            curl -L https://unpkg.com/lucide@latest/dist/umd/lucide.min.js \
              -o android/app/src/main/assets/lucide.min.js
          fi

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/budgetflow.jks

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_FILE:     ${{ github.workspace }}/budgetflow.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/BudgetFlow-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BudgetFlow-release-apk
          path: android/app/build/outputs/apk/release/BudgetFlow-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/BudgetFlow-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
