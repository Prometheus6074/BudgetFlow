plugins {
    id 'com.android.application'
}

android {
    namespace      'com.budgetflow.app'
    compileSdk     34

    defaultConfig {
        applicationId  "com.budgetflow.app"
        minSdk         23          // Android 6 — covers ~97 % of active devices
        targetSdk      34
        versionCode    1
        versionName    "1.0.0"
    }

    // Read signing config from environment variables injected by CI
    signingConfigs {
        release {
            storeFile     file(System.getenv("KEYSTORE_FILE") ?: "placeholder.jks")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
            keyAlias      System.getenv("KEY_ALIAS")         ?: ""
            keyPassword   System.getenv("KEY_PASSWORD")      ?: ""
        }
    }

    buildTypes {
        release {
            minifyEnabled   false   // App is tiny; no benefit from shrinking
            shrinkResources false
            signingConfig   signingConfigs.release
        }
        debug {
            applicationIdSuffix ".debug"
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // No external dependencies needed — pure WebView wrapper
}
